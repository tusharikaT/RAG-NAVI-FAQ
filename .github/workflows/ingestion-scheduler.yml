name: Data Ingestion Scheduler

on:
  schedule:
    # 10:00 AM IST is 4:30 AM UTC
    - cron: '30 4 * * *'
  workflow_dispatch: # Allow manual triggering from GitHub UI

jobs:
  ingest-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Ensure we have the right permissions to push back to the repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Data Ingestion Pipeline
        run: |
          python main.py --ingest-only
        env:
          # In case the scraper needs any env vars, though Groq is mostly used in inference.
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Commit and push updated vector store
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add only the chroma_db folder
          git add data/chroma_db/
          
          # Only commit and push if there are actual changes
          git diff --staged --quiet || (git commit -m "chore: auto-update chroma_db [skip ci]" && git push)
